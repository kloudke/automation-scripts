name: WordPress Migration

on:
  push:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of posts to migrate per run (leave blank for all)'
        required: false
        default: '1'
      status:
        description: 'Post status to migrate (e.g., publish, draft, any, pending, private)'
        required: false
        default: 'private'
      dry_run:
        description: 'Check connectivity to source and dest without migrating'
        type: boolean
        required: false
        default: true

jobs:
  migrate-posts:
    runs-on:
      group: kloudke
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        working-directory: ./wordpress
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Download previous state if it exists to pick up where we left off
      - name: Download Migration State
        uses: actions/download-artifact@v6
        with:
          name: migration-state
          path: ./wordpress/
        continue-on-error: true # It will fail on the first run, which is fine
          
      - name: Run Migration Script
        working-directory: ./wordpress
        env:
          SOURCE_WP_URL: ${{ secrets.SOURCE_WP_URL }}
          SOURCE_WP_USER: ${{ secrets.SOURCE_WP_USER }}
          SOURCE_WP_APP_PASSWORD: ${{ secrets.SOURCE_WP_APP_PASSWORD }}
          DEST_WP_URL: ${{ secrets.DEST_WP_URL }}
          DEST_WP_USER: ${{ secrets.DEST_WP_USER }}
          DEST_WP_APP_PASSWORD: ${{ secrets.DEST_WP_APP_PASSWORD }}
        run: |
          CMD="python main.py"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            CMD="$CMD --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.status }}" ]; then
            CMD="$CMD --status ${{ github.event.inputs.status }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event.inputs.dry_run }}" = "True" ]; then
            CMD="$CMD --dry-run"
          fi
          $CMD
          
      - name: Run De-indexing Script
        working-directory: ./wordpress
        if: success()
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google_creds.json
            export GOOGLE_APPLICATION_CREDENTIALS="google_creds.json"
          else
            echo "Warning: GOOGLE_CREDENTIALS secret is not set!"
          fi
          
          if [ -f "migrated_urls.txt" ]; then
            python deindex.py
          else
            echo "No URLs migrated, skipping de-indexing."
          fi
          
          rm -f google_creds.json

      # Upload the state so the next run knows what has already been migrated
      - name: Upload Migration State
        uses: actions/upload-artifact@v4
        # Upload even if the script fails partway through
        if: always() 
        with:
          name: migration-state
          path: ./wordpress/migration_state.json
          retention-days: 5
