name: WordPress Migration

on:
  push:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of posts to migrate per run (leave blank for all):'
        required: false
        default: ''
      status:
        description: 'Post status to migrate (e.g. publish, draft, pending, private):'
        required: false
        default: ''
      dry_run:
        description: 'Dry run to check connectivity to source and destination:'
        type: boolean
        required: false
        default: false

jobs:
  migrate-posts:
    runs-on:
      group: kloudke
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        working-directory: ./wordpress
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Download previous state if it exists to pick up where we left off
      - name: Download Migration State
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: wp-migrate.yml
          name: migration-state
          path: ./wordpress/
          if_no_artifact_found: warn
        continue-on-error: true # It will fail on the first run, which is fine
          
      - name: Run Migration Script
        working-directory: ./wordpress
        env:
          SOURCE_WP_URL: ${{ secrets.SOURCE_WP_URL }}
          SOURCE_WP_USER: ${{ secrets.SOURCE_WP_USER }}
          SOURCE_WP_APP_PASSWORD: ${{ secrets.SOURCE_WP_APP_PASSWORD }}
          DEST_WP_URL: ${{ secrets.DEST_WP_URL }}
          DEST_WP_USER: ${{ secrets.DEST_WP_USER }}
          DEST_WP_APP_PASSWORD: ${{ secrets.DEST_WP_APP_PASSWORD }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_STATUS: ${{ inputs.status }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          CMD="python main.py"
          if [ -n "$INPUT_LIMIT" ]; then
            CMD="$CMD --limit $INPUT_LIMIT"
          fi
          if [ -n "$INPUT_STATUS" ]; then
            CMD="$CMD --status $INPUT_STATUS"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ] || [ "$INPUT_DRY_RUN" = "True" ] || [ "${{ github.event_name }}" = "push" ]; then
            CMD="$CMD --dry-run"
          fi
          $CMD
          
      # Upload the migrated URLs so the de-indexing workflow can process them
      - name: Upload Migrated URLs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: migrated-urls
          path: ./wordpress/migrated_urls.txt
          retention-days: 5
          if-no-files-found: ignore

      # Upload the state so the next run knows what has already been migrated
      - name: Upload Migration State
        uses: actions/upload-artifact@v4
        # Upload even if the script fails partway through
        if: always() 
        with:
          name: migration-state
          path: ./wordpress/migration_state.json
          retention-days: 5
