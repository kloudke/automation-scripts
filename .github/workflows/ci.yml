name: WordPress CI

on:
  push:
    paths:
      - "wordpress/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "wordpress/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  code-quality-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: wordpress/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Compile Python files
        run: python -m compileall main.py deindex.py

      - name: Lint with Ruff
        run: ruff check main.py deindex.py

      - name: Security scan with Bandit
        run: bandit -r main.py deindex.py

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  unit-testing-integration:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: wordpress/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock requests-mock

      - name: Smoke test imports
        run: |
          python -m compileall main.py deindex.py
          python -c "import main; import deindex"

      - name: Run tests if present
        run: |
          shopt -s nullglob
          tests=(tests/test_*.py test_*.py *_test.py)
          if (( ${#tests[@]} )); then
            pytest -q
          else
            echo "No tests found; skipping pytest. Add tests under tests/ or test_*.py to enable unit/integration testing."
          fi
